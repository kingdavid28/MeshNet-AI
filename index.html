
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA identity -->
    <title>MeshNet AI</title>
    <meta name="description" content="Enables offline emergency communication and routing during disasters with easy alerts, medical requests, and GPS sharing via a secure mesh network." />
    <meta name="theme-color" content="#0f172a" />

    <!-- PWA install hints — modern standard + iOS Safari legacy -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeshNet AI" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="robots" content="noindex, nofollow" />

    <!-- Content-Security-Policy (browser / PWA context — Electron uses main.js session headers)
         unsafe-inline required for Vite HMR injected preamble; unsafe-eval for module evaluation. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' http://localhost:* ws://localhost:*;
      script-src  'self' 'unsafe-eval' 'unsafe-inline';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob: https://*.tile.openstreetmap.org https://*.openstreetmap.org;
      connect-src 'self' http://localhost:* ws://localhost:* https://tile.openstreetmap.org
                  http://192.168.137.1:* http://192.168.42.1:* http://10.42.0.1:*;
    " />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
